name: Release

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        default: 'v0.0.1'

jobs:
 android:
    runs-on: ubuntu-latest
    env:
      output: "${{ github.workspace }}/build/app/outputs/apk/release"
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download AList Source Code
        run: |
          cd $GITHUB_WORKSPACE/alist-lib/scripts
          chmod +x *.sh
          ./init_alist.sh
          ./init_web.sh

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build AList
        run: |
            cd $GITHUB_WORKSPACE/alist-lib/scripts
            chmod +x *.sh
            ./init_gomobile.sh
            ./gobind.sh
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: "AList"
          path: "${{ github.workspace }}/android/app/libs/*.aar"

      - name: Check Secrets
        run: |
          if [ -n "${{ secrets.KEY_STORE }}" ]; then
            echo "HAS_KEYSTORE=true" >> $GITHUB_ENV
          else
            echo "HAS_KEYSTORE=false" >> $GITHUB_ENV
          fi

      - name: Init Signature
        if: env.HAS_KEYSTORE == 'true'
        run: |
          touch local.properties
          cd android
          echo ALIAS_NAME='${{ secrets.ALIAS_NAME }}' >> local.properties
          echo ALIAS_PASSWORD='${{ secrets.ALIAS_PASSWORD }}' >> local.properties
          echo KEY_PASSWORD='${{ secrets.KEY_PASSWORD }}' >> local.properties
          echo KEY_PATH='./key.jks' >> local.properties
          echo ${{ secrets.KEY_STORE }} | base64 --decode > $GITHUB_WORKSPACE/android/app/key.jks

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.7'

      - name: Build APK (release signed)
        if: env.HAS_KEYSTORE == 'true'
        run: flutter build apk --split-per-abi --release

      - name: Build APK (debug)
        if: env.HAS_KEYSTORE != 'true'
        run: flutter build apk --split-per-abi --debug

      - name: Upload missing_rules.txt
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: "missing_rules"
          path: "${{ github.workspace }}/build/app/outputs/mapping/release/missing_rules.txt"

      - name: Init APP Version Name
        run: |
          APK_OUTPUT_DIR="${{ env.output }}"
          if [ ! -d "$APK_OUTPUT_DIR" ]; then
            APK_OUTPUT_DIR="${{ github.workspace }}/build/app/outputs/apk/debug"
          fi
          echo "apk_dir=$APK_OUTPUT_DIR" >> $GITHUB_ENV
          echo "ver_name=$(grep -m 1 'versionName' $APK_OUTPUT_DIR/output-metadata.json | cut -d\" -f4)" >> $GITHUB_ENV
          
      - uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.event.inputs.tag }}
          tag_name: ${{ github.event.inputs.tag }}
          body_path: ${{ github.workspace }}/CHANGELOG.md
          draft: false
          prerelease: false
          files: ${{ env.apk_dir }}/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
